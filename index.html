<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f8f5f2;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #e8c9b0;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 50px;
}

.hero-text h1 {
  font-size: 50px;
}

.hero img {
  width: 300px;
  border-radius: 10px;
}

/* BUTTON */
.btn {
  padding: 10px 20px;
  background: #b87b5e;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

/* PRODUCTS */
.section {
  padding: 40px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
}

/* CART */
#cart-box {
  position: fixed;
  right: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: white;
  padding: 10px;
  overflow-y: auto;
  border-left: 1px solid #ccc;
}

</style>
</head>

<body>

<header>
  <div class="logo">VELORA</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Cart</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Discover Your Beauty</h1>
    <button class="btn">Shop Now</button>
  </div>
  <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
</section>

<!-- PRODUCTS -->
<section class="section">
  <h2>Best Sellers</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
      <h3>Serum</h3>
      <p>₹999</p>
      <button class="btn" onclick="addToCart('Serum',999)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h3>Moisturizer</h3>
      <p>₹799</p>
      <button class="btn" onclick="addToCart('Moisturizer',799)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd">
      <h3>Face Oil</h3>
      <p>₹899</p>
      <button class="btn" onclick="addToCart('Face Oil',899)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa">
      <h3>Cream</h3>
      <p>₹699</p>
      <button class="btn" onclick="addToCart('Cream',699)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CART -->
<div id="cart-box">
  <h3>Cart</h3>
  <div id="cart-items"></div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  showCart();
}

function showCart() {
  let box = document.getElementById("cart-items");
  box.innerHTML = "";

  cart.forEach(item => {
    box.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
  });
}

showCart();
</script>

</body>
  </html>
