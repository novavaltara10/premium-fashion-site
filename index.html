<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f8f5f2;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #e8c9b0;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 50px;
}

.hero-text h1 {
  font-size: 45px;
}

.hero img {
  width: 300px;
  border-radius: 10px;
}

/* CATEGORY */
.category {
  padding: 30px;
}

.cat-items {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.cat-items div {
  text-align: center;
}

.cat-items img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

/* PRODUCTS */
.products {
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
}

/* BUTTON */
.btn {
  background: #b87b5e;
  color: white;
  border: none;
  padding: 8px 15px;
  cursor: pointer;
}

/* CART */
#cart-box {
  position: fixed;
  right: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: white;
  padding: 10px;
  overflow-y: auto;
  border-left: 1px solid #ccc;
}
</style>
</head>

<body>

<header>
  <div class="logo">VELORA</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Cart</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Discover Your Beauty</h1>
    <button class="btn">Shop Now</button>
  </div>
  <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
</section>

<section class="category">
  <h2>Categories</h2>
  <div class="cat-items">
    <div><img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad"><p>Makeup</p></div>
    <div><img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"><p>Skincare</p></div>
    <div><img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd"><p>Hair</p></div>
  </div>
</section>

<section class="products">
  <h2>Best Sellers</h2>
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
      <h4>Serum</h4>
      <p>₹999</p>
      <button class="btn" onclick="addToCart('Serum',999)">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h4>Cream</h4>
      <p>₹799</p>
      <button class="btn" onclick="addToCart('Cream',799)">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd">
      <h4>Oil</h4>
      <p>₹899</p>
      <button class="btn" onclick="addToCart('Oil',899)">Add</button>
    </div>

  </div>
</section>

<div id="cart-box">
  <h3>Cart</h3>
  <div id="cart-items"></div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  cart.push({name,price});
  localStorage.setItem("cart", JSON.stringify(cart));
  showCart();
}

function showCart(){
  let box = document.getElementById("cart-items");
  box.innerHTML = "";
  cart.forEach(item=>{
    box.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
  });
}

showCart();
</script>

</body>
</html>
